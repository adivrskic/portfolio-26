<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#e8e8ee" />
    <title>Adi Vrskic — Creative Developer</title>
    <meta
      name="description"
      content="Full-stack creative developer building AI-powered products, immersive 3D web experiences, and large-scale applications. React, Three.js, AI integration."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Adi Vrskic — Creative Developer" />
    <meta
      property="og:description"
      content="Full-stack engineer specializing in React, Three.js, and AI. Building things that feel alive."
    />
    <meta property="og:url" content="https://adivrskic.dev" />
    <meta property="og:image" content="https://adivrskic.dev/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Adi Vrskic — Creative Developer" />
    <meta
      name="twitter:description"
      content="Full-stack engineer specializing in React, Three.js, and AI."
    />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Print stylesheet -->
    <link rel="stylesheet" href="/print.css" media="print" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      body {
        background: #e8e8ee;
      }
      /* Inline loading spinner — shows before React mounts */
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #e8e8ee;
        z-index: 9999;
        transition: opacity 0.5s;
      }
      #initial-loader.fade {
        opacity: 0;
        pointer-events: none;
      }
      #initial-loader svg {
        width: 72px;
        height: 72px;
      }
      @keyframes avDraw {
        from {
          stroke-dashoffset: 1;
        }
        to {
          stroke-dashoffset: 0;
        }
      }
      @keyframes avCircle {
        from {
          stroke-dashoffset: 1;
          opacity: 0;
        }
        to {
          stroke-dashoffset: 0;
          opacity: 1;
        }
      }
      .av-circle {
        stroke-dasharray: 1;
        stroke-dashoffset: 1;
        animation: avCircle 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }
      .av-letter {
        stroke-dasharray: 1;
        stroke-dashoffset: 1;
        animation: avDraw 1.4s cubic-bezier(0.22, 1, 0.36, 1) 0.4s forwards;
      }
      .av-letter-v {
        animation-delay: 0.6s;
      }
      .av-crossbar {
        animation-delay: 0.8s;
      }
    </style>
  </head>
  <body>
    <!-- Loading spinner — visible until React hydrates -->
    <div id="initial-loader">
      <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle
          class="av-circle"
          cx="36"
          cy="36"
          r="32"
          stroke="#1a1a2e"
          stroke-width="0.6"
          opacity="0.12"
          pathLength="1"
        />
        <path
          class="av-letter"
          d="M17 52 L27 22 L37 52"
          stroke="#1a1a2e"
          stroke-width="0.9"
          stroke-linecap="round"
          stroke-linejoin="round"
          opacity="0.28"
          pathLength="1"
        />
        <path
          class="av-letter av-crossbar"
          d="M21 44 L33 44"
          stroke="#1a1a2e"
          stroke-width="0.7"
          stroke-linecap="round"
          opacity="0.18"
          pathLength="1"
        />
        <path
          class="av-letter av-letter-v"
          d="M37 22 L47 52 L57 22"
          stroke="#1a1a2e"
          stroke-width="0.9"
          stroke-linecap="round"
          stroke-linejoin="round"
          opacity="0.28"
          pathLength="1"
        />
      </svg>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Fade out loader once React renders
      window.addEventListener("DOMContentLoaded", () => {
        const check = setInterval(() => {
          if (document.querySelector(".app-root")) {
            document.getElementById("initial-loader")?.classList.add("fade");
            setTimeout(
              () => document.getElementById("initial-loader")?.remove(),
              600
            );
            clearInterval(check);
          }
        }, 100);
      });
    </script>
  </body>
</html>

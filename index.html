    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      body {
        background: #e8e8ee;
      }
      /* Inline loading spinner — shows before React mounts */
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #e8e8ee;
        z-index: 9999;
        transition: opacity 0.5s;
      }
      #initial-loader.fade {
        opacity: 0;
        pointer-events: none;
      }
      #initial-loader svg {
        width: 48px;
        height: 48px;
      }
      #initial-loader path {
        stroke: url(#fp-grad-init);
        stroke-dasharray: 1;
        stroke-dashoffset: 1;
        animation: fpDraw 0.8s ease-out forwards;
      }
      #initial-loader path:nth-child(2) {
        animation-delay: 0s;
      }
      #initial-loader path:nth-child(3) {
        animation-delay: 0.06s;
      }
      #initial-loader path:nth-child(4) {
        animation-delay: 0.12s;
      }
      #initial-loader path:nth-child(5) {
        animation-delay: 0.18s;
      }
      #initial-loader path:nth-child(6) {
        animation-delay: 0.24s;
      }
      #initial-loader path:nth-child(7) {
        animation-delay: 0.3s;
      }
      #initial-loader path:nth-child(8) {
        animation-delay: 0.36s;
      }
      #initial-loader path:nth-child(9) {
        animation-delay: 0.42s;
      }
      #initial-loader path:nth-child(10) {
        animation-delay: 0.48s;
      }
      @keyframes fpDraw {
        to {
          stroke-dashoffset: 0;
        }
      }
      /* Noscript fallback */

    <script>
      // Fade out loader once React renders
      window.addEventListener("DOMContentLoaded", () => {
        const check = setInterval(() => {
          if (document.querySelector(".app-root")) {
            document.getElementById("initial-loader")?.classList.add("fade");
            setTimeout(
              () => document.getElementById("initial-loader")?.remove(),
              600
            );
            clearInterval(check);
          }
        }, 100);
      });

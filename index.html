<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#e8e8ee" />
    <title>Adi Vrskic — Creative Developer</title>
    <meta
      name="description"
      content="Full-stack creative developer building AI-powered products, immersive 3D web experiences, and large-scale applications. React, Three.js, AI integration."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Adi Vrskic — Creative Developer" />
    <meta
      property="og:description"
      content="Full-stack engineer specializing in React, Three.js, and AI. Building things that feel alive."
    />
    <meta property="og:url" content="https://adivrskic.dev" />
    <meta property="og:image" content="https://adivrskic.dev/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Adi Vrskic — Creative Developer" />
    <meta
      name="twitter:description"
      content="Full-stack engineer specializing in React, Three.js, and AI."
    />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Print stylesheet -->
    <link rel="stylesheet" href="/print.css" media="print" />

    <!-- Preconnect to image CDN -->
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />

    <!-- Fonts -->
    <link
      rel="preload"
      href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.1.1/files/inter-latin-300-normal.woff"
      as="font"
      type="font/woff"
      crossorigin
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      body {
        background: #e8e8ee;
      }
      /* Inline loading spinner — shows before React mounts */
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #e8e8ee;
        z-index: 9999;
        transition: opacity 0.5s;
      }
      #initial-loader.fade {
        opacity: 0;
        pointer-events: none;
      }
      #initial-loader svg {
        width: 48px;
        height: 48px;
        opacity: 0.3;
        animation: fpPulse 2s ease-in-out infinite;
      }
      @keyframes fpPulse {
        0%,
        100% {
          opacity: 0.15;
        }
        50% {
          opacity: 0.4;
        }
      }
    </style>
  </head>
  <body>
    <!-- Loading spinner — visible until React hydrates -->
    <div id="initial-loader">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="#1a1a2e"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path d="M12 10a2 2 0 0 0-2 2c0 1.02-.1 2.51-.26 4" />
        <path d="M14 13.12c0 2.38 0 6.38-1 8.88" />
        <path d="M17.29 21.02c.12-.6.43-2.3.5-3.02" />
        <path d="M2 12a10 10 0 0 1 18-6" />
        <path d="M2 16h.01" />
        <path d="M21.8 16c.2-2 .131-5.354 0-6" />
        <path d="M5 19.5C5.5 18 6 15 6 12a6 6 0 0 1 .34-2" />
        <path d="M8.65 22c.21-.66.45-1.32.57-2" />
        <path d="M9 6.8a6 6 0 0 1 9 5.2v2" />
      </svg>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Fade out loader once React renders
      window.addEventListener("DOMContentLoaded", () => {
        const check = setInterval(() => {
          if (document.querySelector(".app-root")) {
            document.getElementById("initial-loader")?.classList.add("fade");
            setTimeout(
              () => document.getElementById("initial-loader")?.remove(),
              600
            );
            clearInterval(check);
          }
        }, 100);
      });
    </script>
  </body>
</html>
